<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBank | Forgot Password</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content">
            <div class="auth-logo">
                <i class="fas fa-key"></i>
            </div>

            <h1 class="welcome-title">Forgot.</h1>
            <p style="color: var(--text-grey); margin-bottom: 40px;">Reset your password securely</p>

            <form id="mobileForgotForm" onsubmit="handleMobileForgot(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-input" placeholder="e.g. name@example.com"
                        required>
                </div>

                <div
                    style="background: #f0f9ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px; margin-bottom: 24px; font-size: 12px; color: #1e40af; text-align: left;">
                    <i class="fas fa-info-circle"></i>
                    A reset link will be sent to your email. Check your inbox and spam folder.
                </div>

                <button type="submit" class="btn-primary-maroon">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-links">
                <a href="mobile-auth.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="mobile-auth.html" class="nav-item">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
</body>

</html>
