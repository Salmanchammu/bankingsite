<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192x192.png">
    <title>SmartBank | Mobile Login</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content">
            <div class="auth-logo">
                <i class="fas fa-landmark"></i>
            </div>

            <h1 class="welcome-title">Welcome.</h1>
            <p style="color: var(--text-grey); margin-bottom: 40px;">Please login to your account</p>

            <form id="mobileLoginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username / Customer ID</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. smart_user" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary-maroon">
                    Login
                </button>
            </form>

            <div id="passcodeLoginSection" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label class="form-label">Quick Passcode</label>
                    <input type="password" id="passcode" class="form-input" maxlength="4" placeholder="••••"
                        style="text-align: center; letter-spacing: 10px; font-size: 24px;">
                </div>
                <button onclick="handlePasscodeLogin()" class="btn-primary-maroon"
                    style="background: var(--accent-gold);">
                    Login with Passcode
                </button>
            </div>

            <div class="auth-links">
                <a href="mobile-forgot-password.html">Forgot Password?</a>
                <a href="mobile-signup.html">New User? Signup</a>
            </div>

            <div style="margin-top: 60px;">
                <img src="https://via.placeholder.com/350x150/8b0000/ffffff?text=Smart+Banking+Offers" alt="Offers"
                    style="width: 100%; border-radius: 12px; box-shadow: var(--card-shadow);">
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item" onclick="alert('Services available after login.')">
                <i class="fas fa-th-large"></i>
                <span class="nav-label">Services</span>
            </a>
            <a href="#" class="nav-item" onclick="alert('Latest offers: 10% cashback on UPI transfers!')">
                <i class="fas fa-percent"></i>
                <span class="nav-label">Offers</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('ServiceWorker registration successful'))
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</body>

</html>
