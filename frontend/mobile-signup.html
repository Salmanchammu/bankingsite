<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBank | Mobile Signup</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content">
            <div class="auth-logo">
                <i class="fas fa-user-plus"></i>
            </div>

            <h1 class="welcome-title">Create Account.</h1>
            <p style="color: var(--text-grey); margin-bottom: 30px;">Join SmartBank today</p>

            <form id="mobileSignupForm" onsubmit="handleMobileSignup(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="signupName" class="form-input" placeholder="e.g. Salman Shad" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="signupUsername" class="form-input" placeholder="choose a username" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="form-input" placeholder="••••••••"
                        required>
                </div>

                <div class="form-group" style="display: flex; gap: 10px; align-items: center;">
                    <input type="checkbox" id="agreeTerms" required
                        style="width: 20px; height: 20px; accent-color: var(--primary-maroon);">
                    <label class="form-label" style="margin-bottom: 0;">I agree to the <a href="#"
                            style="color: var(--primary-maroon); font-weight: 600;">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-primary-maroon">
                    Create Account
                </button>
            </form>

            <div class="auth-links">
                <a href="mobile-auth.html">Already have an account? Login</a>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="mobile-auth.html" class="nav-item">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
</body>

</html>
